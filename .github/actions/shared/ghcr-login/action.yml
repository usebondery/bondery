name: Log in to GHCR
description: Authenticate Docker with GitHub Container Registry.

inputs:
  registry:
    description: Container registry host
    required: false
    default: ghcr.io
  username:
    description: Registry username
    required: true
  password:
    description: Registry password or token
    required: true

runs:
  using: composite
  steps:
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}
