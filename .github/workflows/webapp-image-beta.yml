name: Webapp Image (Beta)

on:
  push:
    branches:
      - main
    paths:
      - "apps/webapp/**"
      - "packages/**"
      - "scripts/**"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".dockerignore"
      - ".github/workflows/webapp-image-beta.yml"
      - ".github/workflows/webapp-image-release.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/usebondery/webapp
  TURBO_TELEMETRY_DISABLED: 1
  OCI_TITLE: Bondery Webapp
  OCI_DESCRIPTION: Bondery webapp (integration builds from main)
  OCI_VENDOR: Bondery
  OCI_AUTHORS: Bondery <team@usebondery.com>
  OCI_SOURCE: https://github.com/usebondery/bondery
  OCI_URL: https://usebondery.com
  OCI_DOCUMENTATION: https://github.com/usebondery/bondery/blob/main/docs/deploy/dokploy.md
  OCI_LICENSES: AGPL-3.0

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Webapp typechecks and policies
        run: npm run check-types -w webapp

      - name: Webapp tests
        run: |
          npm run test:theme -w webapp
          npm run test:sync -w webapp
          npm run test:runtime-config -w webapp

  build-push:
    needs: gate
    runs-on: ubuntu-latest
    env:
      TURBO_TEAM: ${{ secrets.PRIVATE_TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.PRIVATE_TURBO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve build timestamp
        id: build_time
        run: echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_WRITE_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=beta
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=${{ env.OCI_TITLE }}
            org.opencontainers.image.description=${{ env.OCI_DESCRIPTION }}
            org.opencontainers.image.vendor=${{ env.OCI_VENDOR }}
            org.opencontainers.image.authors=${{ env.OCI_AUTHORS }}
            org.opencontainers.image.source=${{ env.OCI_SOURCE }}
            org.opencontainers.image.url=${{ env.OCI_URL }}
            org.opencontainers.image.documentation=${{ env.OCI_DOCUMENTATION }}
            org.opencontainers.image.licenses=${{ env.OCI_LICENSES }}
            org.opencontainers.image.version=beta
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.build_time.outputs.created }}
          annotations: |
            org.opencontainers.image.title=${{ env.OCI_TITLE }}
            org.opencontainers.image.description=${{ env.OCI_DESCRIPTION }}
            org.opencontainers.image.vendor=${{ env.OCI_VENDOR }}
            org.opencontainers.image.authors=${{ env.OCI_AUTHORS }}
            org.opencontainers.image.source=${{ env.OCI_SOURCE }}
            org.opencontainers.image.url=${{ env.OCI_URL }}
            org.opencontainers.image.documentation=${{ env.OCI_DOCUMENTATION }}
            org.opencontainers.image.licenses=${{ env.OCI_LICENSES }}
            org.opencontainers.image.version=beta
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.build_time.outputs.created }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/webapp/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BONDERY_GIT_SHA=${{ github.sha }}
            BONDERY_VERSION=beta
            BUILD_DATE=${{ steps.build_time.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

