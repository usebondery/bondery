name: Release - Webapp

on:
  push:
    tags:
      - "webapp-*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (format: webapp-X.Y.Z)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  validate:
    uses: ./.github/workflows/shared-release-validate.yml
    with:
      tag_prefix: webapp
      manual_release_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}

  build-push:
    needs: validate
    uses: ./.github/workflows/shared-docker-build-push.yml
    secrets: inherit
    with:
      checkout_ref: ${{ needs.validate.outputs.tag }}
      dockerfile: apps/webapp/Dockerfile
      dockerignore_file: .dockerignore.webapp
      image_name: ghcr.io/usebondery/webapp
      docker_tags: |
        type=raw,value=${{ needs.validate.outputs.version }}
        type=raw,value=production
      oci_title: Bondery Webapp
      oci_description: Bondery production webapp
      oci_documentation: https://github.com/usebondery/bondery/blob/main/docs/deploy/dokploy.md
      oci_version: ${{ needs.validate.outputs.version }}
      git_sha: ${{ github.sha }}
      build_args: |
        BONDERY_INFRA_GIT_SHA=${{ github.sha }}
        BONDERY_INFRA_VERSION=${{ needs.validate.outputs.version }}

  github-release:
    needs: [validate, build-push]
    uses: ./.github/workflows/shared-container-github-release.yml
    with:
      tag: ${{ needs.validate.outputs.tag }}
      version: ${{ needs.validate.outputs.version }}
      image_name: ghcr.io/usebondery/webapp
      product_name: Bondery Webapp
