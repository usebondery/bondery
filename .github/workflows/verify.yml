name: Verify

on:
  pull_request:
  push:
    branches:
      - main

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  contract:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v7
        with:
          node-version: latest
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: biomejs/setup-biome@v2
        with:
          version: 2.5.0

      - name: Biome
        run: biome ci .

      - name: Check dev ports
        run: npm run check-dev-ports

      - name: Check package imports
        run: npm run check-package-imports

      - name: Check env sync (examples + turbo)
        run: npm run env -- --check

      - name: Validate doc links
        run: npm run check-doc-links

      - name: Check OpenAPI spec
        run: npm run check-openapi

      - name: Validate Bondery deploy compose
        run: |
          cp deploy/bondery/.env.example deploy/bondery/.env
          docker compose -f deploy/bondery/docker-compose.yml config >/dev/null
          node deploy/bondery/scripts/check-compose.mjs

      - name: Webapp runtime config tests
        run: npm run test:runtime-config -w webapp

      - name: Schema contract tests
        run: npm run test:contracts

      - name: Typecheck
        run: npm run check-types

      - name: Translation checks
        run: |
          npm run check-translations
          npm run check-api-error-translations
          npm run i18n:types:check
          npm run i18n:status:check
          node packages/translations/scripts/verify-i18next-hook-extraction.mjs
          npm run i18n:lint

      - name: API error checks
        run: |
          npm run check-error-docs
          npm run check-user-facing-errors

      - name: API sync unit tests
        run: npm run test:sync -w apps/api

      - name: API smoke tests
        run: npm run test:api -w apps/api
