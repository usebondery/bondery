name: API Image (Beta)

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "packages/**"
      - "scripts/**"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".dockerignore"
      - ".github/workflows/api-image-beta.yml"
      - ".github/workflows/api-image-release.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/usebondery/api
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: API sync unit tests
        run: npm run test:sync -w api

      - name: API smoke tests
        run: npm run test:api -w api

  build-push:
    needs: gate
    runs-on: ubuntu-latest
    env:
      TURBO_TEAM: ${{ secrets.PRIVATE_TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.PRIVATE_TURBO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_WRITE_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=beta
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
