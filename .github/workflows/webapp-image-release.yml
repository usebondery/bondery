name: Webapp Image (Release)

on:
  push:
    tags:
      - "webapp-*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (format: webapp-X.Y.Z)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/usebondery/webapp
  TURBO_TELEMETRY_DISABLED: 1
  OCI_TITLE: Bondery Webapp
  OCI_DESCRIPTION: Bondery production webapp
  OCI_VENDOR: Bondery
  OCI_AUTHORS: Bondery <team@usebondery.com>
  OCI_SOURCE: https://github.com/usebondery/bondery
  OCI_URL: https://usebondery.com
  OCI_DOCUMENTATION: https://github.com/usebondery/bondery/blob/main/docs/deploy/dokploy.md
  OCI_LICENSES: AGPL-3.0

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_meta.outputs.tag }}
      version: ${{ steps.release_meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release metadata
        id: release_meta
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if ! echo "$TAG" | grep -Eq '^webapp-[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid release tag: $TAG"
            echo "Expected format: webapp-X.Y.Z"
            exit 1
          fi

          VERSION="${TAG#webapp-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag commit is on release branch
        run: |
          git fetch origin release
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/release"; then
            echo "Tagged commit is not on the release branch."
            echo "Create production tags only from commits merged into release."
            exit 1
          fi

      - name: Ensure release tag exists for manual runs
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.release_meta.outputs.tag }}"
          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
          else
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "$TAG"
          fi

  build-push:
    needs: validate
    runs-on: ubuntu-latest
    env:
      TURBO_TEAM: ${{ secrets.PRIVATE_TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.PRIVATE_TURBO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve build timestamp
        id: build_time
        run: echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_WRITE_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.validate.outputs.version }}
            type=raw,value=production
          labels: |
            org.opencontainers.image.title=${{ env.OCI_TITLE }}
            org.opencontainers.image.description=${{ env.OCI_DESCRIPTION }}
            org.opencontainers.image.vendor=${{ env.OCI_VENDOR }}
            org.opencontainers.image.authors=${{ env.OCI_AUTHORS }}
            org.opencontainers.image.source=${{ env.OCI_SOURCE }}
            org.opencontainers.image.url=${{ env.OCI_URL }}
            org.opencontainers.image.documentation=${{ env.OCI_DOCUMENTATION }}
            org.opencontainers.image.licenses=${{ env.OCI_LICENSES }}
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.build_time.outputs.created }}
          annotations: |
            org.opencontainers.image.title=${{ env.OCI_TITLE }}
            org.opencontainers.image.description=${{ env.OCI_DESCRIPTION }}
            org.opencontainers.image.vendor=${{ env.OCI_VENDOR }}
            org.opencontainers.image.authors=${{ env.OCI_AUTHORS }}
            org.opencontainers.image.source=${{ env.OCI_SOURCE }}
            org.opencontainers.image.url=${{ env.OCI_URL }}
            org.opencontainers.image.documentation=${{ env.OCI_DOCUMENTATION }}
            org.opencontainers.image.licenses=${{ env.OCI_LICENSES }}
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.build_time.outputs.created }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/webapp/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BONDERY_GIT_SHA=${{ github.sha }}
            BONDERY_VERSION=${{ needs.validate.outputs.version }}
            BUILD_DATE=${{ steps.build_time.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  github-release:
    needs: [validate, build-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
          persist-credentials: false

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: Bondery Webapp ${{ needs.validate.outputs.version }}
          generate_release_notes: true
          body: |
            ## Bondery Webapp ${{ needs.validate.outputs.version }}

            Container image: `${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.version }}`

            Floating channel tag: `${{ env.IMAGE_NAME }}:production`

            Deploy in Dokploy by pinning the application image to the semver tag.

