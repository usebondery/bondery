    get:
      tags:
        - Geocode
      description: Returns mapped address/place autocomplete entries from Mapy.com
      parameters:
        - schema:
            minLength: 3
            maxLength: 200
            type: string
          in: query
          name: q
          required: true
        - schema:
            default: address
            anyOf:
              - type: string
                enum:
                  - address
              - type: string
                enum:
                  - place
          in: query
          name: mode
          required: false
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - addresses
                properties:
                  addresses:
                    type: array
                    items:
                      type: object
                      required:
                        - value
                        - type
                        - label
                        - latitude
                        - longitude
                        - addressLine1
                        - addressLine2
                        - addressCity
                        - addressPostalCode
                        - addressState
                        - addressStateCode
                        - addressCountry
                        - addressCountryCode
                        - addressGranularity
                        - addressFormatted
                        - addressGeocodeSource
                        - geocodeConfidence
                        - timezone
                      properties:
                        value:
                          type: string
                        type:
                          anyOf:
                            - type: string
                              enum:
                                - home
                            - type: string
                              enum:
                                - work
                            - type: string
                              enum:
                                - other
                        label:
                          anyOf:
                            - type: string
                            - type: "null"
                        latitude:
                          anyOf:
                            - type: number
                            - type: "null"
                        longitude:
                          anyOf:
                            - type: number
                            - type: "null"
                        addressLine1:
                          anyOf:
                            - type: string
                            - type: "null"
                        addressLine2:
                          anyOf:
                            - type: string
                            - type: "null"
                        addressCity:
                          anyOf:
                            - type: string
                            - type: "null"
                        addressPostalCode:
                          anyOf:
                            - type: string
                            - type: "null"
                        addressState:
                          anyOf:
                            - type: string
                            - type: "null"
                        addressStateCode:
                          anyOf:
                            - type: string
                            - type: "null"
                        addressCountry:
                          anyOf:
                            - type: string
                            - type: "null"
                        addressCountryCode:
                          anyOf:
                            - type: string
                            - type: "null"
                        addressGranularity:
                          anyOf:
                            - type: string
                              enum:
                                - address
                            - type: string
                              enum:
                                - city
                            - type: string
                              enum:
                                - state
