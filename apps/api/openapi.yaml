          nullable: true
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - label
        - color
        - createdAt
        - updatedAt
      additionalProperties: false
      description: Tag read model
    Group:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        label:
          type: string
        emoji:
          type: string
        color:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - label
        - emoji
        - color
        - createdAt
        - updatedAt
      additionalProperties: false
      description: Group read model
    Interaction:
      type: object
