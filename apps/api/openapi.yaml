openapi: 3.0.3
info:
  contact:
    name: Bondery Support
    url: https://usebondery.com
  description: >-
    REST API for the Bondery application — a contact and relationship management platform.


    ## Authentication


    Most endpoints require authentication via a Supabase session cookie or a Bearer token (session JWT or long-lived API
    key).


    **Session auth:** Sign in via the webapp; the browser sends session cookies or a Supabase access token.


    **API keys:** Create keys in Settings → API keys. Send `Authorization: Bearer bondery_key_…` on allowed integration
    routes (contacts, groups, tags, interactions, imports, share, geocode). Keys support `read` (GET/HEAD) or `full`
    access. See the authentication guide.


    Endpoints under `/api/me/api-keys`, `/api/sync`, `/api/chat`, `/api/admin`, `/api/subscriptions`, and
    `/api/extension` do not accept API keys.
  license:
    name: Proprietary
  title: Bondery API
  version: 1.0.0
components:
  securitySchemes:
    apiKeyAuth:
      bearerFormat: API Key
      description: "Long-lived API key created in Settings → API keys. Format: `bondery_key_<keyId>_<secret>`. Only works on
        integration routes (contacts, groups, tags, interactions, imports, share, geocode). Supports `read` (GET/HEAD)
        or `full` access."
      scheme: bearer
      type: http
    bearerAuth:
      bearerFormat: JWT
      description: "Supabase session access token from the webapp or mobile app. Send as `Authorization: Bearer <access_token>`."
      scheme: bearer
      type: http
  schemas:
    ContactId:
      type: string
      format: uuid
      description: Contact person UUID
    ApiError:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/ApiErrorBody"
      required:
        - error
      additionalProperties: false
      description: Error response with a human-readable message
      example:
        error:
          code: validation_error
          doc_url: https://usebondery.com/docs/api/errors/validation_error
          message: body.email Invalid input
          request_id: 00000000-0000-0000-0000-000000000000
          type: invalid_request_error
          param: body.email
    ApiErrorBody:
      type: object
      properties:
        code:
          type: string
        details:
          type: object
          additionalProperties: {}
        doc_url:
          type: string
          format: uri
        message:
          type: string
        param:
          type: string
        request_id:
          type: string
        retry_after:
          type: integer
          minimum: 0
          exclusiveMinimum: true
          maximum: 9007199254740991
        type:
          type: string
          enum:
            - invalid_request_error
            - authentication_error
            - authorization_error
            - not_found_error
            - conflict_error
            - rate_limit_error
            - api_error
            - service_unavailable_error
      required:
        - code
        - doc_url
        - message
        - request_id
        - type
      additionalProperties: false
    PaginationMeta:
      type: object
      properties:
        hasMore:
          type: boolean
        limit:
          type: integer
          minimum: 0
          exclusiveMinimum: true
          maximum: 9007199254740991
        offset:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        search:
          nullable: true
          type: string
        sort:
          nullable: true
          type: string
        totalCount:
          type: integer
          minimum: 0
          maximum: 9007199254740991
      required:
        - hasMore
        - limit
        - offset
        - search
        - sort
        - totalCount
      additionalProperties: false
      description: Pagination metadata
      example:
