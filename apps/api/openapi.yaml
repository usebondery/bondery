openapi: 3.0.3
info:
  title: Bondery API
  description: >-
    REST API for the Bondery application — a contact and relationship management platform.


    ## Authentication


    All endpoints (except `/status` and `GET /api/redirect`) require authentication via a Supabase session cookie or a
    Bearer token in the Authorization header.
  version: 1.0.0
  contact:
    name: Bondery Support
    url: https://usebondery.com
  license:
    name: Proprietary
components:
  schemas: {}
paths:
  /status:
    get:
      tags:
        - Health
      responses:
        "200":
          description: Default Response
  /api/contacts:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            minimum: 1
            maximum: 200
            default: 50
            type: integer
          in: query
          name: limit
          required: false
        - schema:
            minimum: 0
            default: 0
            type: integer
          in: query
          name: offset
          required: false
        - schema:
            type: string
          in: query
          name: q
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - nameAsc
              - type: string
                enum:
                  - nameDesc
              - type: string
                enum:
                  - surnameAsc
              - type: string
                enum:
                  - surnameDesc
              - type: string
                enum:
                  - interactionAsc
              - type: string
                enum:
                  - interactionDesc
          in: query
          name: sort
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - low
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - high
          in: query
          name: avatarQuality
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - small
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - large
          in: query
          name: avatarSize
          required: false
      responses:
        "200":
          description: Default Response
    post:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
              properties:
                firstName:
                  minLength: 1
                  type: string
                lastName:
                  minLength: 1
                  type: string
                middleName:
                  type: string
                linkedin:
                  type: string
      responses:
        "200":
          description: Default Response
    delete:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - type: object
                  required:
                    - ids
                  properties:
                    ids:
                      minItems: 1
                      type: array
                      items:
                        type: string
                - type: object
                  required:
                    - filter
                  properties:
                    filter:
                      type: object
                      properties:
                        q:
                          type: string
                    excludeIds:
                      type: array
                      items:
                        type: string
      responses:
        "200":
          description: Default Response
  /api/contacts/important-dates/upcoming:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            anyOf:
              - type: string
                enum:
                  - low
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - high
          in: query
          name: avatarQuality
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - small
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - large
          in: query
          name: avatarSize
          required: false
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}:
    delete:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            anyOf:
              - type: string
                enum:
                  - low
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - high
          in: query
          name: avatarQuality
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - small
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - large
          in: query
          name: avatarSize
          required: false
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    patch:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  minLength: 1
                  type: string
                middleName:
                  anyOf:
                    - type: string
                    - type: "null"
                lastName:
                  anyOf:
                    - type: string
                    - type: "null"
                headline:
                  anyOf:
                    - type: string
                    - type: "null"
                location:
                  anyOf:
                    - type: string
                    - type: "null"
                notes:
                  anyOf:
                    - type: string
                    - type: "null"
                language:
                  anyOf:
                    - type: string
                    - type: "null"
                timezone:
                  anyOf:
                    - type: string
                    - type: "null"
                gisPoint:
                  anyOf:
                    - type: string
                    - type: "null"
                latitude:
                  anyOf:
                    - type: number
                    - type: "null"
                longitude:
                  anyOf:
                    - type: number
                    - type: "null"
                lastInteraction:
                  anyOf:
                    - type: string
                    - type: "null"
                phones:
                  type: array
                  items:
                    type: object
                    required:
                      - value
                    properties:
                      prefix:
                        type: string
                      value:
                        type: string
                      type:
                        type: string
                      preferred:
                        type: boolean
                emails:
                  type: array
                  items:
                    type: object
                    required:
                      - value
                    properties:
                      value:
                        type: string
                      type:
                        type: string
                      preferred:
                        type: boolean
                addresses:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      value:
                        type: string
                      addressLine1:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressLine2:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressCity:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressPostalCode:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressState:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressStateCode:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressCountry:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressCountryCode:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressGranularity:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressFormatted:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressGeocodeSource:
                        anyOf:
                          - type: string
                          - type: "null"
                      latitude:
                        anyOf:
                          - type: number
                          - type: "null"
                      longitude:
                        anyOf:
                          - type: number
                          - type: "null"
                linkedin:
                  anyOf:
                    - type: string
                    - type: "null"
                instagram:
                  anyOf:
                    - type: string
                    - type: "null"
                whatsapp:
                  anyOf:
                    - type: string
                    - type: "null"
                facebook:
                  anyOf:
                    - type: string
                    - type: "null"
                website:
                  anyOf:
                    - type: string
                    - type: "null"
                signal:
                  anyOf:
                    - type: string
                    - type: "null"
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/merge-recommendations:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            type: string
          in: query
          name: declined
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - low
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - high
          in: query
          name: avatarQuality
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - small
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - large
          in: query
          name: avatarSize
          required: false
      responses:
        "200":
          description: Default Response
  /api/contacts/merge-recommendations/refresh:
    post:
      tags:
        - Contacts
      responses:
        "200":
          description: Default Response
  /api/contacts/merge-recommendations/{id}/decline:
    patch:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/merge-recommendations/{id}/restore:
    patch:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/merge:
    post:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - leftPersonId
                - rightPersonId
              properties:
                leftPersonId:
                  minLength: 1
                  type: string
                rightPersonId:
                  minLength: 1
                  type: string
                conflictResolutions:
                  type: object
                  additionalProperties:
                    anyOf:
                      - type: string
                        enum:
                          - left
                      - type: string
                        enum:
                          - right
      responses:
        "200":
          description: Default Response
  /api/contacts/by-social:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            type: string
          in: query
          name: platform
          required: false
        - schema:
            type: string
          in: query
          name: handle
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - low
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - high
          in: query
          name: avatarQuality
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - small
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - large
          in: query
          name: avatarSize
          required: false
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/groups:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/tags:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    post:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tagId
              properties:
                tagId:
                  minLength: 1
                  type: string
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/tags/{tagId}:
    delete:
      tags:
        - Contacts
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
          name: tagId
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/relationships:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            anyOf:
              - type: string
                enum:
                  - low
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - high
          in: query
          name: avatarQuality
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - small
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - large
          in: query
          name: avatarSize
          required: false
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    post:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - relatedPersonId
                - relationshipType
              properties:
                relatedPersonId:
                  minLength: 1
                  type: string
                relationshipType:
                  anyOf:
                    - type: string
                      enum:
                        - parent
                    - type: string
                      enum:
                        - child
                    - type: string
                      enum:
                        - spouse
                    - type: string
                      enum:
                        - partner
                    - type: string
                      enum:
                        - sibling
                    - type: string
                      enum:
                        - friend
                    - type: string
                      enum:
                        - colleague
                    - type: string
                      enum:
                        - neighbor
                    - type: string
                      enum:
                        - guardian
                    - type: string
                      enum:
                        - dependent
                    - type: string
                      enum:
                        - other
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/relationships/{relationshipId}:
    patch:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - relatedPersonId
                - relationshipType
              properties:
                relatedPersonId:
                  minLength: 1
                  type: string
                relationshipType:
                  anyOf:
                    - type: string
                      enum:
                        - parent
                    - type: string
                      enum:
                        - child
                    - type: string
                      enum:
                        - spouse
                    - type: string
                      enum:
                        - partner
                    - type: string
                      enum:
                        - sibling
                    - type: string
                      enum:
                        - friend
                    - type: string
                      enum:
                        - colleague
                    - type: string
                      enum:
                        - neighbor
                    - type: string
                      enum:
                        - guardian
                    - type: string
                      enum:
                        - dependent
                    - type: string
                      enum:
                        - other
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
          name: relationshipId
          required: true
      responses:
        "200":
          description: Default Response
    delete:
      tags:
        - Contacts
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
          name: relationshipId
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/important-dates:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    put:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - dates
              properties:
                dates:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - date
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                      date:
                        pattern: ^\d{4}-\d{2}-\d{2}$
                        type: string
                      note:
                        anyOf:
                          - type: string
                          - type: "null"
                      notifyDaysBefore:
                        anyOf:
                          - type: number
                            enum:
                              - 1
                          - type: number
                            enum:
                              - 3
                          - type: number
                            enum:
                              - 7
                          - type: "null"
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/photo:
    post:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    delete:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/vcard:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            anyOf:
              - type: string
                enum:
                  - low
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - high
          in: query
          name: avatarQuality
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - small
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - large
          in: query
          name: avatarSize
          required: false
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/linkedin-data:
    post:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workHistory:
                  type: array
                  items:
                    type: object
                    required:
                      - companyName
                    properties:
                      title:
                        type: string
                      companyName:
                        type: string
                      companyLinkedinId:
                        type: string
                      startDate:
                        type: string
                      endDate:
                        type: string
                      employmentType:
                        type: string
                      location:
                        type: string
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/enrich:
    post:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                middleName:
                  anyOf:
                    - type: string
                    - type: "null"
                lastName:
                  anyOf:
                    - type: string
                    - type: "null"
                profileImageUrl:
                  anyOf:
                    - type: string
                    - type: "null"
                headline:
                  anyOf:
                    - type: string
                    - type: "null"
                location:
                  anyOf:
                    - type: string
                    - type: "null"
                linkedinBio:
                  anyOf:
                    - type: string
                    - type: "null"
                workHistory:
                  type: array
                  items:
                    type: object
                    required:
                      - companyName
                    properties:
                      companyName:
                        type: string
                      companyLinkedinId:
                        type: string
                      title:
                        type: string
                      description:
                        type: string
                      startDate:
                        type: string
                      endDate:
                        type: string
                      employmentType:
                        type: string
                      location:
                        type: string
                educationHistory:
                  type: array
                  items:
                    type: object
                    required:
                      - schoolName
                    properties:
                      schoolName:
                        type: string
                      schoolLinkedinId:
                        type: string
                      degree:
                        type: string
                      description:
                        type: string
                      startDate:
                        type: string
                      endDate:
                        type: string
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/enrich-queue/eligible-count:
    get:
      tags:
        - Contacts
      responses:
        "200":
          description: Default Response
  /api/contacts/enrich-queue/status:
    get:
      tags:
        - Contacts
      responses:
        "200":
          description: Default Response
  /api/contacts/enrich-queue/init:
    post:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                personId:
                  type: string
      responses:
        "200":
          description: Default Response
  /api/contacts/enrich-queue/next-batch:
    get:
      tags:
        - Contacts
      responses:
        "200":
          description: Default Response
  /api/contacts/enrich-queue/{id}:
    patch:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  anyOf:
                    - type: string
                      enum:
                        - completed
                    - type: string
                      enum:
                        - failed
                errorMessage:
                  anyOf:
                    - type: string
                    - type: "null"
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/enrich-queue:
    delete:
      tags:
        - Contacts
      responses:
        "200":
          description: Default Response
  /api/contacts/import/linkedin/parse:
    post:
      tags:
        - Import
      responses:
        "200":
          description: Default Response
  /api/contacts/import/linkedin/commit:
    post:
      tags:
        - Import
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - contacts
              properties:
                contacts:
                  minItems: 1
                  type: array
                  items:
                    type: object
                    required:
                      - firstName
                      - lastName
                      - linkedinUsername
                      - isValid
                    properties:
                      firstName:
                        type: string
                      lastName:
                        anyOf:
                          - type: string
                          - type: "null"
                      middleName:
                        anyOf:
                          - type: string
                          - type: "null"
                      linkedinUsername:
                        type: string
                      email:
                        anyOf:
                          - type: string
                          - type: "null"
                      position:
                        anyOf:
                          - type: string
                          - type: "null"
                      company:
                        anyOf:
                          - type: string
                          - type: "null"
                      connectedAt:
                        anyOf:
                          - type: string
                          - type: "null"
                      isValid:
                        type: boolean
      responses:
        "200":
          description: Default Response
  /api/contacts/import/instagram/parse:
    post:
      tags:
        - Import
      responses:
        "200":
          description: Default Response
  /api/contacts/import/instagram/commit:
    post:
      tags:
        - Import
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - contacts
              properties:
                contacts:
                  minItems: 1
                  type: array
                  items:
                    type: object
                    required:
                      - firstName
