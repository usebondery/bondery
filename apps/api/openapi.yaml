  /api/sync/pull:
    get:
      tags:
        - Sync
      description: Incremental sync pull — returns change batches since a server sequence.
      parameters:
        - schema:
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: since
          required: true
        - schema:
            type: integer
            minimum: 1
            maximum: 100
          in: query
          name: limit
        - schema:
            type: integer
            minimum: 0
            maximum: 30000
          in: query
          name: waitMs
      security: *a2
      responses:
        "200":
          description: Sync change batches
          content:
            application/json:
              schema:
                type: object
                properties:
                  batches:
                    type: array
                    items:
                      type: object
                      properties:
                        serverSequence:
                          type: integer
                          minimum: 0
                          exclusiveMinimum: true
                          maximum: 9007199254740991
                        changes:
                          minItems: 1
                          type: array
                          items:
                            type: object
                            properties:
                              table:
                                type: string
                                enum:
                                  - people
                                  - people_phones
                                  - people_emails
                                  - people_addresses
                                  - people_socials
                                  - groups
                                  - people_groups
                                  - tags
                                  - people_tags
                                  - people_important_dates
                              operation:
                                type: string
                                enum:
                                  - insert
                                  - update
                                  - delete
                              entityId:
                                type: string
                                format: uuid
                              value:
                                nullable: true
                                type: object
                                additionalProperties: {}
                            required:
                              - table
                              - operation
                              - entityId
                              - value
                            additionalProperties: false
                      required:
                        - serverSequence
                        - changes
                      additionalProperties: false
