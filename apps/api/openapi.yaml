openapi: 3.0.3
info:
  title: Bondery API
  description: >-
    REST API for the Bondery application — a contact and relationship management platform.


    ## Authentication


    All endpoints (except `/status` and `GET /api/redirect`) require authentication via a Supabase session cookie or a
    Bearer token in the Authorization header.
  version: 1.0.0
  contact:
    name: Bondery Support
    url: https://usebondery.com
  license:
    name: Proprietary
components:
  schemas: {}
paths:
  /status:
    get:
      tags:
        - Health
      responses:
        "200":
          description: Default Response
  /api/contacts:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            minimum: 1
            maximum: 200
            default: 50
            type: integer
          in: query
          name: limit
          required: false
        - schema:
            minimum: 0
            default: 0
            type: integer
          in: query
          name: offset
          required: false
        - schema:
            type: string
          in: query
          name: q
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - nameAsc
              - type: string
                enum:
                  - nameDesc
              - type: string
                enum:
                  - surnameAsc
              - type: string
                enum:
                  - surnameDesc
              - type: string
                enum:
                  - interactionAsc
              - type: string
                enum:
                  - interactionDesc
          in: query
          name: sort
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - low
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - high
          in: query
          name: avatarQuality
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - small
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - large
          in: query
          name: avatarSize
          required: false
      responses:
        "200":
          description: Default Response
    post:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  minLength: 1
                  type: string
                lastName:
                  minLength: 1
                  type: string
                middleName:
                  type: string
                linkedin:
                  type: string
              required:
                - firstName
                - lastName
      responses:
        "200":
          description: Default Response
    delete:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - type: object
                  properties:
                    ids:
                      minItems: 1
                      type: array
                      items:
                        type: string
                  required:
                    - ids
                - type: object
                  properties:
                    filter:
                      type: object
                      properties:
                        q:
                          type: string
                    excludeIds:
                      type: array
                      items:
                        type: string
                  required:
                    - filter
      responses:
        "200":
          description: Default Response
  /api/contacts/important-dates/upcoming:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            anyOf:
              - type: string
                enum:
                  - low
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - high
          in: query
          name: avatarQuality
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - small
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - large
          in: query
          name: avatarSize
          required: false
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}:
    delete:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            anyOf:
              - type: string
                enum:
                  - low
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - high
          in: query
          name: avatarQuality
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - small
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - large
          in: query
          name: avatarSize
          required: false
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    patch:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  minLength: 1
                  type: string
                middleName:
                  anyOf:
                    - type: string
                    - type: "null"
                lastName:
                  anyOf:
                    - type: string
                    - type: "null"
                headline:
                  anyOf:
                    - type: string
                    - type: "null"
                place:
                  anyOf:
                    - type: string
                    - type: "null"
                notes:
                  anyOf:
                    - type: string
                    - type: "null"
                language:
                  anyOf:
                    - type: string
                    - type: "null"
                timezone:
                  anyOf:
                    - type: string
                    - type: "null"
                location:
                  anyOf:
                    - type: string
                    - type: "null"
                latitude:
                  anyOf:
                    - type: number
                    - type: "null"
                longitude:
                  anyOf:
                    - type: number
                    - type: "null"
                addressLine1:
                  anyOf:
                    - type: string
                    - type: "null"
                addressLine2:
                  anyOf:
                    - type: string
                    - type: "null"
                addressCity:
                  anyOf:
                    - type: string
                    - type: "null"
                addressPostalCode:
                  anyOf:
                    - type: string
                    - type: "null"
                addressState:
                  anyOf:
                    - type: string
                    - type: "null"
                addressStateCode:
                  anyOf:
                    - type: string
                    - type: "null"
                addressCountry:
                  anyOf:
                    - type: string
                    - type: "null"
                addressCountryCode:
                  anyOf:
                    - type: string
                    - type: "null"
                addressGranularity:
                  anyOf:
                    - type: string
                    - type: "null"
                addressFormatted:
                  anyOf:
                    - type: string
                    - type: "null"
                addressGeocodeSource:
                  anyOf:
                    - type: string
                    - type: "null"
                lastInteraction:
                  anyOf:
                    - type: string
                    - type: "null"
                phones:
                  type: array
                  items:
                    type: object
                    properties:
                      prefix:
                        type: string
                      value:
                        type: string
                      type:
                        type: string
                      preferred:
                        type: boolean
                    required:
                      - value
                emails:
                  type: array
                  items:
                    type: object
                    properties:
                      value:
                        type: string
                      type:
                        type: string
                      preferred:
                        type: boolean
                    required:
                      - value
                addresses:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      value:
                        type: string
                      addressLine1:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressLine2:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressCity:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressPostalCode:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressState:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressStateCode:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressCountry:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressCountryCode:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressGranularity:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressFormatted:
                        anyOf:
                          - type: string
                          - type: "null"
                      addressGeocodeSource:
                        anyOf:
                          - type: string
                          - type: "null"
                      latitude:
                        anyOf:
                          - type: number
                          - type: "null"
                      longitude:
                        anyOf:
                          - type: number
                          - type: "null"
                linkedin:
                  anyOf:
                    - type: string
                    - type: "null"
                instagram:
                  anyOf:
                    - type: string
                    - type: "null"
                whatsapp:
                  anyOf:
                    - type: string
                    - type: "null"
                facebook:
                  anyOf:
                    - type: string
                    - type: "null"
                website:
                  anyOf:
                    - type: string
                    - type: "null"
                signal:
                  anyOf:
                    - type: string
                    - type: "null"
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/merge-recommendations:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            type: string
          in: query
          name: declined
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - low
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - high
          in: query
          name: avatarQuality
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - small
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - large
          in: query
          name: avatarSize
          required: false
      responses:
        "200":
          description: Default Response
  /api/contacts/merge-recommendations/refresh:
    post:
      tags:
        - Contacts
      responses:
        "200":
          description: Default Response
  /api/contacts/merge-recommendations/{id}/decline:
    patch:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/merge-recommendations/{id}/restore:
    patch:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/merge:
    post:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                leftPersonId:
                  minLength: 1
                  type: string
                rightPersonId:
                  minLength: 1
                  type: string
                conflictResolutions:
                  type: object
                  additionalProperties:
                    anyOf:
                      - type: string
                        enum:
                          - left
                      - type: string
                        enum:
                          - right
              required:
                - leftPersonId
                - rightPersonId
      responses:
        "200":
          description: Default Response
  /api/contacts/by-social:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            type: string
          in: query
          name: platform
          required: false
        - schema:
            type: string
          in: query
          name: handle
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - low
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - high
          in: query
          name: avatarQuality
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - small
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - large
          in: query
          name: avatarSize
          required: false
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/groups:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/tags:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    post:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tagId:
                  minLength: 1
                  type: string
              required:
                - tagId
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/tags/{tagId}:
    delete:
      tags:
        - Contacts
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
          name: tagId
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/relationships:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            anyOf:
              - type: string
                enum:
                  - low
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - high
          in: query
          name: avatarQuality
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - small
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - large
          in: query
          name: avatarSize
          required: false
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    post:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                relatedPersonId:
                  minLength: 1
                  type: string
                relationshipType:
                  anyOf:
                    - type: string
                      enum:
                        - parent
                    - type: string
                      enum:
                        - child
                    - type: string
                      enum:
                        - spouse
                    - type: string
                      enum:
                        - partner
                    - type: string
                      enum:
                        - sibling
                    - type: string
                      enum:
                        - friend
                    - type: string
                      enum:
                        - colleague
                    - type: string
                      enum:
                        - neighbor
                    - type: string
                      enum:
                        - guardian
                    - type: string
                      enum:
                        - dependent
                    - type: string
                      enum:
                        - other
              required:
                - relatedPersonId
                - relationshipType
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/relationships/{relationshipId}:
    patch:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                relatedPersonId:
                  minLength: 1
                  type: string
                relationshipType:
                  anyOf:
                    - type: string
                      enum:
                        - parent
                    - type: string
                      enum:
                        - child
                    - type: string
                      enum:
                        - spouse
                    - type: string
                      enum:
                        - partner
                    - type: string
                      enum:
                        - sibling
                    - type: string
                      enum:
                        - friend
                    - type: string
                      enum:
                        - colleague
                    - type: string
                      enum:
                        - neighbor
                    - type: string
                      enum:
                        - guardian
                    - type: string
                      enum:
                        - dependent
                    - type: string
                      enum:
                        - other
              required:
                - relatedPersonId
                - relationshipType
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
          name: relationshipId
          required: true
      responses:
        "200":
          description: Default Response
    delete:
      tags:
        - Contacts
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
          name: relationshipId
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/important-dates:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    put:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dates:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                      date:
                        pattern: ^\d{4}-\d{2}-\d{2}$
                        type: string
                      note:
                        anyOf:
                          - type: string
                          - type: "null"
                      notifyDaysBefore:
                        anyOf:
                          - type: number
                            enum:
                              - 1
                          - type: number
                            enum:
                              - 3
                          - type: number
                            enum:
                              - 7
                          - type: "null"
                    required:
                      - type
                      - date
              required:
                - dates
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/photo:
    post:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    delete:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/vcard:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            anyOf:
              - type: string
                enum:
                  - low
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - high
          in: query
          name: avatarQuality
          required: false
        - schema:
            anyOf:
              - type: string
                enum:
                  - small
              - type: string
                enum:
                  - medium
              - type: string
                enum:
                  - large
          in: query
          name: avatarSize
          required: false
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/linkedin-data:
    post:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workHistory:
                  type: array
                  items:
                    type: object
                    properties:
                      title:
                        type: string
                      companyName:
                        type: string
                      companyLinkedinId:
                        type: string
                      startDate:
                        type: string
                      endDate:
                        type: string
                      employmentType:
                        type: string
                      location:
                        type: string
                    required:
                      - companyName
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/{id}/enrich:
    post:
      tags:
        - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                middleName:
                  anyOf:
                    - type: string
                    - type: "null"
                lastName:
                  anyOf:
                    - type: string
                    - type: "null"
                profileImageUrl:
                  anyOf:
                    - type: string
                    - type: "null"
                headline:
                  anyOf:
                    - type: string
                    - type: "null"
                place:
                  anyOf:
                    - type: string
                    - type: "null"
                linkedinBio:
                  anyOf:
                    - type: string
                    - type: "null"
                workHistory:
                  type: array
                  items:
                    type: object
                    properties:
                      companyName:
                        type: string
                      companyLinkedinId:
                        type: string
                      title:
                        type: string
                      description:
                        type: string
                      startDate:
                        type: string
                      endDate:
                        type: string
                      employmentType:
                        type: string
                      location:
                        type: string
                    required:
                      - companyName
                educationHistory:
                  type: array
                  items:
                    type: object
                    properties:
                      schoolName:
                        type: string
                      schoolLinkedinId:
                        type: string
                      degree:
                        type: string
                      description:
                        type: string
                      startDate:
                        type: string
                      endDate:
                        type: string
                    required:
                      - schoolName
      parameters:
        - schema:
            format: uuid
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/contacts/import/linkedin/parse:
    post:
      tags:
        - Import
      responses:
        "200":
          description: Default Response
  /api/contacts/import/linkedin/commit:
    post:
      tags:
        - Import
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contacts:
                  minItems: 1
                  type: array
                  items:
                    type: object
                    properties:
                      firstName:
                        type: string
                      lastName:
                        anyOf:
                          - type: string
                          - type: "null"
                      middleName:
                        anyOf:
                          - type: string
                          - type: "null"
                      linkedinUsername:
                        type: string
                      email:
                        anyOf:
                          - type: string
                          - type: "null"
                      position:
                        anyOf:
                          - type: string
                          - type: "null"
                      company:
                        anyOf:
                          - type: string
                          - type: "null"
                      connectedAt:
                        anyOf:
                          - type: string
                          - type: "null"
                      isValid:
                        type: boolean
                    required:
                      - firstName
                      - lastName
                      - linkedinUsername
                      - isValid
              required:
                - contacts
      responses:
        "200":
          description: Default Response
  /api/contacts/import/instagram/parse:
    post:
      tags:
        - Import
      responses:
        "200":
          description: Default Response
  /api/contacts/import/instagram/commit:
    post:
      tags:
        - Import
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contacts:
                  minItems: 1
                  type: array
                  items:
                    type: object
                    properties:
                      firstName:
                        type: string
                      middleName:
                        anyOf:
                          - type: string
                          - type: "null"
                      lastName:
                        anyOf:
                          - type: string
                          - type: "null"
                      instagramUsername:
                        type: string
                      connectedAt:
                        anyOf:
                          - type: string
                          - type: "null"
                      isValid:
                        type: boolean
                      sources:
                        type: array
                        items:
                          type: string
                    required:
                      - firstName
                      - instagramUsername
                      - isValid
              required:
                - contacts
      responses:
        "200":
          description: Default Response
  /api/groups:
    get:
      tags:
        - Groups
