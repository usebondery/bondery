openapi: 3.0.3
info:
  title: Bondery API
  description: >-
    REST API for the Bondery application — a contact and relationship management platform.


    ## Health checks


    - `GET /status` — **Liveness**. Returns 200 when the API process is running. Does not probe external dependencies.

    - `GET /health` — **Readiness**. Probes Supabase (auth, database, storage), Redis, and reports configuration status
    for other integrations. Cached for one minute; rate limited to one request per minute per client. Returns 503 when
    critical dependencies are unavailable.


    ## Authentication


    Most endpoints require authentication via a Supabase session cookie or a Bearer token (session JWT or long-lived API
    key).


    **Session auth:** Sign in via the webapp; the browser sends session cookies or a Supabase access token.


    **API keys:** Create keys in Settings → API keys. Send `Authorization: Bearer bondery_key_…` on allowed integration
    routes (contacts, groups, tags, interactions, imports, share, geocode). Keys support `read` (GET/HEAD) or `full`
    access. See the authentication guide.


    Endpoints under `/api/me/api-keys`, `/api/sync`, `/api/chat`, `/api/admin`, `/api/subscriptions`, and
    `/api/extension` do not accept API keys.
  version: 1.0.0
  contact:
    name: Bondery Support
    url: https://usebondery.com
  license:
    name: Proprietary
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Supabase session access token from the webapp or mobile app. Send as `Authorization: Bearer <access_token>`."
    apiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: "Long-lived API key created in Settings → API keys. Format: `bondery_key_<keyId>_<secret>`. Only works on
        integration routes (contacts, groups, tags, interactions, imports, share, geocode). Supports `read` (GET/HEAD)
        or `full` access."
  schemas: {}
paths:
  /status:
    get:
      tags:
        - Health
      description: Liveness probe. Returns 200 when the API process is running. Does not check external dependencies. Use `GET
        /health` for a readiness probe that checks Supabase, Redis, and other configured integrations.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                  timestamp:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  extension:
                    type: object
                    properties:
                      minVersion:
                        type: string
                      storeUrl:
                        type: string
                    required:
                      - minVersion
                      - storeUrl
                    additionalProperties: false
                required:
                  - status
                  - timestamp
                  - extension
                additionalProperties: false
  /health:
    get:
      tags:
        - Health
      description: "Readiness probe. Checks configured dependencies and returns per-service status. Results are cached in
        memory for one minute. Rate limited to one request per minute per client. Returns HTTP 503 when critical
        dependencies are unavailable (`status: unhealthy`). Returns HTTP 200 when all critical dependencies are healthy
        (`status: ok` or `status: degraded`). Supabase auth is checked via `GET /auth/v1/health`; Supabase database
        (PostgREST) via `GET /rest-admin/v1/ready`; Supabase storage via `GET /storage/v1/health`."
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                      - degraded
                      - unhealthy
                  timestamp:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  cached:
                    type: boolean
                  cacheExpiresAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  services:
                    type: object
                    properties:
                      supabase:
                        type: object
                        properties:
                          auth:
                            type: object
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                            required:
                              - ok
                            additionalProperties: false
                          database:
                            type: object
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                            required:
                              - ok
                            additionalProperties: false
                          storage:
                            type: object
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                            required:
                              - ok
                            additionalProperties: false
                        required:
                          - auth
                          - database
                          - storage
                        additionalProperties: false
                      redis:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      smtp:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      anthropic:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      polar:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      mapy:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      posthog:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                    required:
                      - supabase
                      - redis
                      - smtp
                      - anthropic
                      - polar
                      - mapy
                      - posthog
                    additionalProperties: false
                required:
                  - status
                  - timestamp
                  - cached
                  - cacheExpiresAt
                  - services
                additionalProperties: false
        "503":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                      - degraded
                      - unhealthy
                  timestamp:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  cached:
                    type: boolean
                  cacheExpiresAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  services:
                    type: object
                    properties:
                      supabase:
                        type: object
                        properties:
                          auth:
                            type: object
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                            required:
                              - ok
                            additionalProperties: false
                          database:
                            type: object
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                            required:
                              - ok
                            additionalProperties: false
                          storage:
                            type: object
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                            required:
                              - ok
                            additionalProperties: false
                        required:
                          - auth
                          - database
                          - storage
                        additionalProperties: false
                      redis:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      smtp:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
