openapi: 3.0.3
info:
  title: Bondery API
  description: >-
    REST API for the Bondery application — a contact and relationship management platform.


    ## Health checks


    - `GET /status` — **Liveness**. Returns 200 when the API process is running. Does not probe external dependencies.

    - `GET /health` — **Readiness**. Probes Supabase (auth, database, storage), Redis, and reports configuration status
    for other integrations. Cached for one minute; rate limited to one request per minute per client. Returns 503 when
    critical dependencies are unavailable.


    ## Authentication


    Most endpoints require authentication via a Supabase session cookie or a Bearer token (session JWT or long-lived API
    key).


    **Session auth:** Sign in via the webapp; the browser sends session cookies or a Supabase access token.


    **API keys:** Create keys in Settings → API keys. Send `Authorization: Bearer bondery_key_…` on allowed integration
    routes (contacts, groups, tags, interactions, imports, share, geocode). Keys support `read` (GET/HEAD) or `full`
    access. See the authentication guide.


    Endpoints under `/api/me/api-keys`, `/api/sync`, `/api/chat`, `/api/admin`, `/api/subscriptions`, and
    `/api/extension` do not accept API keys.
  version: 1.0.0
  contact:
    name: Bondery Support
    url: https://usebondery.com
  license:
    name: Proprietary
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Supabase session access token from the webapp or mobile app. Send as `Authorization: Bearer <access_token>`."
    apiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: "Long-lived API key created in Settings → API keys. Format: `bondery_key_<keyId>_<secret>`. Only works on
        integration routes (contacts, groups, tags, interactions, imports, share, geocode). Supports `read` (GET/HEAD)
        or `full` access."
  schemas:
    ContactId:
      type: string
      format: uuid
      description: Contact person UUID
    ApiError:
      type: object
      properties:
        error:
          type: string
        description:
          type: string
      required:
        - error
      additionalProperties: false
      description: Error response with a human-readable message
      example:
        error: Invalid request body
    Contact:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        firstName:
          type: string
        middleName:
          nullable: true
          type: string
        lastName:
          nullable: true
          type: string
        headline:
          nullable: true
          type: string
        location:
          nullable: true
          type: string
        notes:
          nullable: true
          type: string
        notesUpdatedAt:
          nullable: true
          type: string
        avatar:
          nullable: true
          type: string
        lastInteraction:
          nullable: true
          type: string
        lastInteractionActivityId:
          nullable: true
          type: string
        keepFrequencyDays:
          nullable: true
          type: number
        createdAt:
          type: string
        updatedAt:
          nullable: true
          type: string
        phones:
          nullable: true
          type: array
          items:
            type: object
            properties:
              prefix:
                type: string
                minLength: 1
              value:
                type: string
                minLength: 1
              type:
                type: string
                enum:
                  - home
                  - work
              preferred:
                type: boolean
            required:
              - prefix
              - value
              - type
              - preferred
            additionalProperties: false
        emails:
          nullable: true
          type: array
          items:
            type: object
            properties:
              value:
                type: string
                minLength: 1
              type:
                type: string
                enum:
                  - home
                  - work
              preferred:
                type: boolean
            required:
              - value
              - type
              - preferred
            additionalProperties: false
        addresses:
          nullable: true
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              type:
                type: string
                enum:
                  - home
                  - work
                  - other
              label:
                nullable: true
                type: string
              latitude:
                nullable: true
                type: number
              longitude:
                nullable: true
                type: number
              addressLine1:
                nullable: true
                type: string
              addressLine2:
                nullable: true
                type: string
              addressCity:
                nullable: true
                type: string
              addressPostalCode:
                nullable: true
                type: string
              addressState:
                nullable: true
                type: string
              addressStateCode:
                nullable: true
                type: string
              addressCountry:
                nullable: true
                type: string
              addressCountryCode:
                nullable: true
                type: string
              addressGranularity:
                type: string
                enum:
                  - address
                  - city
                  - state
                  - country
              addressFormatted:
                nullable: true
                type: string
              addressGeocodeSource:
                nullable: true
                type: string
                enum:
                  - mapy.com
                  - manual
              geocodeConfidence:
                nullable: true
                type: string
                enum:
                  - verified
                  - unverifiable
              timezone:
                nullable: true
                type: string
            required:
              - value
              - type
              - label
              - latitude
              - longitude
              - addressLine1
              - addressLine2
              - addressCity
              - addressPostalCode
              - addressState
              - addressStateCode
              - addressCountry
              - addressCountryCode
              - addressGranularity
              - addressFormatted
              - addressGeocodeSource
              - geocodeConfidence
              - timezone
            additionalProperties: false
        linkedin:
          nullable: true
          type: string
        instagram:
          nullable: true
          type: string
        whatsapp:
          nullable: true
          type: string
        facebook:
          nullable: true
          type: string
        website:
          nullable: true
          type: string
        signal:
          nullable: true
          type: string
        importantDates:
          nullable: true
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              userId:
                type: string
              personId:
                type: string
              type:
                type: string
                enum:
                  - birthday
                  - anniversary
                  - nameday
                  - graduation
                  - other
              date:
                type: string
                pattern: ^\d{4}-\d{2}-\d{2}$
              note:
                nullable: true
                type: string
              notifyDaysBefore:
                anyOf:
                  - type: number
                    enum:
                      - 1
                  - type: number
                    enum:
                      - 3
                  - type: number
                    enum:
                      - 7
                  - type: string
                    nullable: true
                    enum:
                      - null
              notifyOn:
                nullable: true
                type: string
              createdAt:
                type: string
              updatedAt:
                type: string
            required:
              - id
              - userId
              - personId
              - type
              - date
              - note
              - notifyDaysBefore
              - notifyOn
              - createdAt
              - updatedAt
            additionalProperties: false
        myself:
          nullable: true
          type: boolean
        position:
          nullable: true
        language:
          nullable: true
          type: string
        timezone:
          nullable: true
          type: string
        gisPoint:
          nullable: true
          type: string
        latitude:
          nullable: true
          type: number
        longitude:
          nullable: true
          type: number
      required:
        - id
        - userId
        - firstName
        - middleName
        - lastName
        - headline
        - location
        - notes
        - avatar
        - lastInteraction
        - lastInteractionActivityId
        - keepFrequencyDays
        - createdAt
        - phones
        - emails
        - linkedin
        - instagram
        - whatsapp
        - facebook
        - website
        - signal
        - myself
        - language
        - timezone
        - gisPoint
        - latitude
        - longitude
      additionalProperties: false
      description: Contact read model
    PaginationMeta:
      type: object
      properties:
        limit:
          type: integer
          minimum: 0
          exclusiveMinimum: true
          maximum: 9007199254740991
        offset:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        totalCount:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        hasMore:
          type: boolean
        sort:
          nullable: true
          type: string
        search:
          nullable: true
          type: string
      required:
        - limit
        - offset
        - totalCount
        - hasMore
        - sort
        - search
      additionalProperties: false
      description: Pagination metadata
    DeleteContactResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
      additionalProperties: false
      description: Single contact delete result
    DeleteContactsResponse:
      type: object
      properties:
        message:
          type: string
        deletedCount:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
      required:
        - message
        - deletedCount
      additionalProperties: false
      description: Bulk contact delete result
    Tag:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        label:
          type: string
