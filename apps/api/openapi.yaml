                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      posthog:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                    required:
                      - supabase
                      - redis
                      - smtp
                      - anthropic
                      - polar
                      - mapy
                      - posthog
                    additionalProperties: false
                required:
                  - status
                  - timestamp
                  - cached
                  - cacheExpiresAt
                  - services
                additionalProperties: false
  /api/contacts/merge-recommendations:
    get:
      tags:
        - Contacts
      parameters:
        - schema:
            default: 50
            type: integer
            minimum: 1
            maximum: 200
          in: query
          name: limit
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: offset
        - schema:
            type: string
          in: query
          name: declined
        - schema:
            type: string
            enum:
              - low
              - medium
              - high
          in: query
          name: avatarQuality
        - schema:
            type: string
            enum:
              - small
              - medium
              - large
          in: query
          name: avatarSize
      responses:
        "200":
          description: Default Response
  /api/contacts/merge-recommendations/refresh:
