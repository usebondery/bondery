openapi: 3.0.3
info:
  title: Bondery API
  description: >-
    REST API for the Bondery application — a contact and relationship management platform.


    ## Health checks


    - `GET /status` — **Liveness**. Returns 200 when the API process is running. Does not probe external dependencies.

    - `GET /health` — **Readiness**. Probes Supabase (auth, database, storage), Redis, and reports configuration status
    for other integrations. Cached for one minute; rate limited to one request per minute per client. Returns 503 when
    critical dependencies are unavailable.


    ## Authentication


    All endpoints (except `/status` and `/health`) require authentication via a Supabase session cookie or a Bearer
    token in the Authorization header.
  version: 1.0.0
  contact:
    name: Bondery Support
    url: https://usebondery.com
  license:
    name: Proprietary
components:
  schemas: {}
paths:
  /status:
    get:
      tags:
        - Health
      description: Liveness probe. Returns 200 when the API process is running. Does not check external dependencies. Use `GET
        /health` for a readiness probe that checks Supabase, Redis, and other configured integrations.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - timestamp
                  - extension
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                  timestamp:
                    format: date-time
                    type: string
                  extension:
                    type: object
                    required:
                      - minVersion
                      - storeUrl
                    properties:
                      minVersion:
                        type: string
                      storeUrl:
                        type: string
  /health:
    get:
      tags:
        - Health
      description: "Readiness probe. Checks configured dependencies and returns per-service status. Results are cached in
        memory for one minute. Rate limited to one request per minute per client. Returns HTTP 503 when critical
        dependencies are unavailable (`status: unhealthy`). Returns HTTP 200 when all critical dependencies are healthy
        (`status: ok` or `status: degraded`). Supabase auth is checked via `GET /auth/v1/health`; Supabase database
        (PostgREST) via `GET /rest-admin/v1/live`; Supabase storage via `GET /storage/v1/health`."
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - timestamp
                  - cached
                  - cacheExpiresAt
                  - services
                properties:
                  status:
                    anyOf:
                      - type: string
                        enum:
                          - ok
                      - type: string
                        enum:
                          - degraded
                      - type: string
                        enum:
                          - unhealthy
                  timestamp:
                    format: date-time
                    type: string
                  cached:
                    description: True when this response was served from the in-process cache (refreshed at most once per minute).
                    type: boolean
                  cacheExpiresAt:
                    format: date-time
                    description: When the cached readiness snapshot expires and the next request will re-probe dependencies.
                    type: string
                  services:
                    type: object
                    required:
                      - supabase
                      - redis
                      - smtp
                      - anthropic
                      - polar
                      - mapy
                      - posthog
                    properties:
                      supabase:
                        type: object
                        required:
                          - auth
                          - database
                          - storage
                        properties:
                          auth:
                            type: object
                            required:
                              - ok
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                          database:
                            type: object
                            required:
                              - ok
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                          storage:
                            type: object
                            required:
                              - ok
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                      redis:
                        type: object
                        required:
                          - ok
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                      smtp:
                        type: object
                        required:
                          - ok
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                      anthropic:
                        type: object
                        required:
                          - ok
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                      polar:
                        type: object
                        required:
                          - ok
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                      mapy:
                        type: object
                        required:
                          - ok
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                      posthog:
                        type: object
                        required:
                          - ok
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
        "503":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - timestamp
                  - cached
                  - cacheExpiresAt
                  - services
                properties:
                  status:
                    anyOf:
                      - type: string
                        enum:
                          - ok
                      - type: string
                        enum:
                          - degraded
                      - type: string
                        enum:
                          - unhealthy
                  timestamp:
                    format: date-time
                    type: string
                  cached:
                    description: True when this response was served from the in-process cache (refreshed at most once per minute).
                    type: boolean
                  cacheExpiresAt:
                    format: date-time
                    description: When the cached readiness snapshot expires and the next request will re-probe dependencies.
                    type: string
                  services:
                    type: object
                    required:
                      - supabase
                      - redis
                      - smtp
                      - anthropic
                      - polar
                      - mapy
                      - posthog
                    properties:
                      supabase:
                        type: object
                        required:
                          - auth
                          - database
                          - storage
                        properties:
                          auth:
                            type: object
                            required:
                              - ok
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                          database:
                            type: object
                            required:
                              - ok
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                          storage:
                            type: object
                            required:
                              - ok
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                      redis:
                        type: object
                        required:
                          - ok
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                      smtp:
                        type: object
                        required:
                          - ok
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                      anthropic:
                        type: object
                        required:
                          - ok
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                      polar:
                        type: object
                        required:
                          - ok
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                      mapy:
                        type: object
                        required:
                          - ok
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                      posthog:
                        type: object
                        required:
                          - ok
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
