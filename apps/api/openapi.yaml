servers:
  - description: Local development server
    url: http://localhost:26631
  - description: Production server
    url: https://api.usebondery.com
tags:
  - description: Liveness and readiness probes. `GET /status` returns 200 when the process is running (no dependency
      checks). `GET /health` probes Supabase, Redis, and integration config; cached for one minute, rate limited to one
      request per minute per client; returns 503 when critical dependencies are unavailable.
    name: Health
  - description: Contact management operations
    name: Contacts
  - description: Group management operations
    name: Groups
  - description: Tag management operations
    name: Tags
  - description: Interaction timeline events
    name: Interactions
  - description: Contact import from social platforms
    name: Import
  - description: Share contacts via email
    name: Share
  - description: Address autocomplete and geocoding proxy
    name: Geocode
  - description: Authenticated user profile, settings, and feedback
    name: Me
  - description: Mobile offline sync — bootstrap, pull, and push
    name: Sync
  - description: Browser extension integration endpoints
    name: Extension
  - description: AI chat assistant
    name: Chat
  - description: Subscription and billing management
    name: Subscriptions
  - description: Admin KPI dashboard metrics
    name: Stats
  - description: Inbound webhooks from third-party services
    name: Webhooks
  - description: Service-to-service endpoints (not user-facing)
    name: Internal
