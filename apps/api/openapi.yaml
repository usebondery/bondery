                        additionalProperties: false
                      polar:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      mapy:
                        type: object
                        properties:
