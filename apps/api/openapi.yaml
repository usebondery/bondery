          type: string
        userId:
          type: string
        title:
          nullable: true
          type: string
        type:
          type: string
          enum:
            - Call
            - Coffee
            - Email
            - Meal
            - Meeting
            - Networking event
            - Note
            - Other
            - Party/Social
            - Text/Messaging
            - Competition/Hackathon
            - Custom
        description:
          nullable: true
          type: string
        date:
          type: string
        participants:
          anyOf:
            - type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  first_name:
                    type: string
                  last_name:
                    nullable: true
                    type: string
                  avatar:
                    nullable: true
                    type: string
                  updated_at:
                    type: string
                required:
                  - id
                  - first_name
                  - last_name
                  - avatar
                additionalProperties: false
            - type: array
              items:
                type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - title
        - type
        - description
        - date
        - createdAt
        - updatedAt
      additionalProperties: false
      description: Interaction read model
paths:
  /status:
    get:
      tags:
        - Health
      description: Liveness probe. Returns 200 when the API process is running. Does not check external dependencies. Use `GET
        /health` for a readiness probe that checks Supabase, Redis, and other configured integrations.
      responses:
        "200":
          description: Liveness status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                  timestamp:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  extension:
                    type: object
                    properties:
                      minVersion:
                        type: string
                      storeUrl:
                        type: string
                    required:
                      - minVersion
                      - storeUrl
                    additionalProperties: false
                required:
                  - status
                  - timestamp
                  - extension
                additionalProperties: false
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /health:
    get:
      tags:
        - Health
      description: "Readiness probe. Checks configured dependencies and returns per-service status. Results are cached in
        memory for one minute. Rate limited to one request per minute per client. Returns HTTP 503 when critical
        dependencies are unavailable (`status: unhealthy`). Returns HTTP 200 when all critical dependencies are healthy
        (`status: ok` or `status: degraded`). Supabase auth is checked via `GET /auth/v1/health`; Supabase database
        (PostgREST) via `GET /rest-admin/v1/ready`; Supabase storage via `GET /storage/v1/health`."
      responses:
        "200":
          description: Readiness report when dependencies are healthy or degraded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                      - degraded
                      - unhealthy
                  timestamp:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  cached:
                    type: boolean
                  cacheExpiresAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  services:
                    type: object
                    properties:
                      supabase:
                        type: object
                        properties:
                          auth:
                            type: object
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                            required:
                              - ok
                            additionalProperties: false
                          database:
                            type: object
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                            required:
                              - ok
                            additionalProperties: false
                          storage:
                            type: object
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                            required:
                              - ok
                            additionalProperties: false
                        required:
                          - auth
                          - database
                          - storage
                        additionalProperties: false
                      redis:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      smtp:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      anthropic:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      polar:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      mapy:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      posthog:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                    required:
                      - supabase
                      - redis
                      - smtp
                      - anthropic
                      - polar
                      - mapy
                      - posthog
                    additionalProperties: false
                required:
                  - status
                  - timestamp
                  - cached
                  - cacheExpiresAt
                  - services
                additionalProperties: false
        "400":
          description: Invalid request
          content:
            application/json:
              schema: {}
        "401":
          description: Authentication required
          content:
            application/json:
              schema: {}
        "403":
          description: Forbidden
          content:
            application/json:
              schema: {}
        "404":
          description: Resource not found
          content:
            application/json:
              schema: {}
        "500":
          description: Internal server error
          content:
            application/json:
              schema: {}
        "503":
          description: Readiness report when critical dependencies are unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                      - degraded
                      - unhealthy
                  timestamp:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  cached:
                    type: boolean
                  cacheExpiresAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  services:
                    type: object
                    properties:
                      supabase:
                        type: object
                        properties:
                          auth:
                            type: object
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                            required:
                              - ok
                            additionalProperties: false
                          database:
                            type: object
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                            required:
                              - ok
                            additionalProperties: false
                          storage:
                            type: object
                            properties:
                              ok:
                                type: boolean
                              latencyMs:
                                type: number
                              error:
                                type: string
                              configured:
                                type: boolean
                            required:
                              - ok
                            additionalProperties: false
                        required:
                          - auth
                          - database
                          - storage
                        additionalProperties: false
                      redis:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      smtp:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      anthropic:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      polar:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      mapy:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                      posthog:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          latencyMs:
                            type: number
                          error:
                            type: string
                          configured:
                            type: boolean
                        required:
                          - ok
                        additionalProperties: false
                    required:
                      - supabase
                      - redis
                      - smtp
                      - anthropic
                      - polar
                      - mapy
                      - posthog
                    additionalProperties: false
                required:
                  - status
                  - timestamp
                  - cached
                  - cacheExpiresAt
                  - services
                additionalProperties: false
  /api/contacts/merge-recommendations:
    get:
      tags:
        - Contacts
      description: List merge recommendations for duplicate contacts.
      parameters:
        - schema:
            default: 50
            type: integer
            minimum: 1
            maximum: 200
          in: query
          name: limit
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: offset
        - schema:
            type: string
          in: query
          name: declined
        - schema:
            type: string
            enum:
              - low
              - medium
              - high
          in: query
          name: avatarQuality
        - schema:
            type: string
            enum:
              - small
              - medium
              - large
          in: query
          name: avatarSize
      security: &a1
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: Merge recommendations
          content:
            application/json:
              schema:
                type: object
                properties:
                  recommendations:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        leftPerson:
                          $ref: "#/components/schemas/Contact"
                        rightPerson:
                          $ref: "#/components/schemas/Contact"
                        score:
                          type: number
                        reasons:
                          type: array
                          items:
                            type: string
                            enum:
                              - fullName
                              - email
                              - phone
                      required:
                        - id
                        - leftPerson
                        - rightPerson
                        - score
                        - reasons
                      additionalProperties: false
                  pagination:
