                      - headline
                      - phones
                      - emails
                      - location
                      - linkedin
                      - instagram
                      - facebook
                      - website
                      - whatsapp
                      - signal
                      - addresses
                      - notes
                      - importantDates
              required:
                - personId
                - recipientEmails
