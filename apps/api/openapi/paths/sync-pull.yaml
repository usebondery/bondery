get:
  operationId: syncPull
  tags: [Sync]
  summary: Pull incremental sync batches since cursor
  description: |
    Returns ordered changelog batches for the authenticated user.
    Requires `X-Bondery-Sync-Protocol: 2`. Use `/api/sync/bootstrap` when `since=0`.
  parameters:
    - $ref: "../components/parameters.yaml#/SyncProtocolHeader"
    - $ref: "../components/parameters.yaml#/SqliteSchemaHeader"
    - name: since
      in: query
      required: true
      schema:
        type: integer
        minimum: 0
    - name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 100
    - name: waitMs
      in: query
      schema:
        type: integer
        minimum: 0
        maximum: 30000
        default: 0
  responses:
    "200":
      description: Changelog batches
      content:
        application/json:
          schema:
            $ref: "../schemas/sync.yaml#/SyncPullResponse"
    "400":
      description: Invalid cursor (use bootstrap)
    "426":
      description: Sync protocol or SQLite schema mismatch
      content:
        application/json:
          schema:
            $ref: "../schemas/sync.yaml#/SyncVersionMismatch"
