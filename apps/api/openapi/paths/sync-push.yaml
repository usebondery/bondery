post:
  operationId: syncPush
  tags: [Sync]
  summary: Apply batched offline mutations
  description: |
    Idempotent mutation batch for mobile offline sync. Requires `X-Bondery-Sync-Protocol`.
    Distinct from `POST /api/subscriptions/sync` (Polar billing).
  parameters:
    - $ref: "../components/parameters.yaml#/SyncProtocolHeader"
    - $ref: "../components/parameters.yaml#/SqliteSchemaHeader"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../schemas/sync.yaml#/SyncPushRequest"
  responses:
    "200":
      description: Per-mutation results
      content:
        application/json:
          schema:
            $ref: "../schemas/sync.yaml#/SyncPushResponse"
    "426":
      description: Sync protocol or SQLite schema mismatch
      content:
        application/json:
          schema:
            $ref: "../schemas/sync.yaml#/SyncVersionMismatch"
