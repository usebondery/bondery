get:
  operationId: syncBootstrap
  tags: [Sync]
  summary: Bootstrap full tier-1 snapshot for mobile SQLite
  description: |
    Returns all replicated rows for the authenticated user and the current changelog head.
    Requires `X-Bondery-Sync-Protocol: 2`.
  parameters:
    - $ref: "../components/parameters.yaml#/SyncProtocolHeader"
    - $ref: "../components/parameters.yaml#/SqliteSchemaHeader"
  responses:
    "200":
      description: Full snapshot
      content:
        application/json:
          schema:
            $ref: "../schemas/sync.yaml#/SyncBootstrapResponse"
    "426":
      description: Sync protocol or SQLite schema mismatch
      content:
        application/json:
          schema:
            $ref: "../schemas/sync.yaml#/SyncVersionMismatch"
