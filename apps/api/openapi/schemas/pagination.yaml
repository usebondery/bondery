PaginationMeta:
  type: object
  required:
    - limit
    - offset
    - totalCount
    - hasMore
    - sort
    - search
  properties:
    limit:
      type: integer
      minimum: 1
      maximum: 200
      description: Page size applied (after clamping)
    offset:
      type: integer
      minimum: 0
      description: Number of items skipped
    totalCount:
      type: integer
      minimum: 0
      description: Total items matching the query across all pages
    hasMore:
      type: boolean
      description: True when offset + current page length < totalCount
    sort:
      type: string
      nullable: true
      description: Effective sort applied (null when route has no sort)
    search:
      type: string
      nullable: true
      description: Normalized search term (null when no search)
